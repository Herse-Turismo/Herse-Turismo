<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sin conexión — Herse Turismo</title>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>Sin conexión a Internet</h1>
  <p>No te preocupes — cuando recuperes la conexión, toda tu información estará disponible. Mientras tanto:</p>
  <div class="tips">
    <h3>Disponible offline</h3>
    <ul>
      <li>Tu itinerario ya cargado</li>
      <li>Contactos de emergencia guardados</li>
      <li>Checklist pre-viaje</li>
      <li>Información del destino</li>
    </ul>
  </div>
  <button class="btn" onclick="location.reload()" style="margin-top:20px">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    Reintentar conexión
  </button>
</div>
</body>
</html>
