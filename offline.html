<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sin conexión — Herse Turismo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f9ff,#e0f2fe);padding:24px}
.card{background:#fff;border-radius:20px;padding:48px 36px;text-align:center;max-width:420px;width:100%;box-shadow:0 8px 40px rgba(0,74,143,.1)}
.icon{font-size:3.5rem;margin-bottom:16px}
h1{font-size:1.4rem;font-weight:900;color:#111827;margin-bottom:8px}
p{font-size:.85rem;color:#6b7280;line-height:1.6;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#1a6cff;color:#fff;border:none;border-radius:10px;font-size:.82rem;font-weight:700;cursor:pointer;transition:.15s}
.btn:hover{background:#1554cc;transform:translateY(-1px)}
.tips{margin-top:24px;text-align:left;background:#f8fafc;border-radius:12px;padding:16px}
.tips h3{font-size:.7rem;font-weight:800;color:#374151;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.tips li{font-size:.72rem;color:#6b7280;margin-bottom:4px;list-style:none;padding-left:16px;position:relative}
.tips li::before{content:'✓';position:absolute;left:0;color:#22c55e;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>Sin conexión a Internet</h1>
  <p>No te preocupes — cuando recuperes la conexión, toda tu información estará disponible. Mientras tanto:</p>
  <div class="tips">
    <h3>Disponible offline</h3>
    <ul>
      <li>Tu itinerario ya cargado</li>
      <li>Contactos de emergencia guardados</li>
      <li>Checklist pre-viaje</li>
      <li>Información del destino</li>
    </ul>
  </div>
  <button class="btn" onclick="location.reload()" style="margin-top:20px">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    Reintentar conexión
  </button>
</div>
</body>
</html>
